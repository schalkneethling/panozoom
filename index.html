<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            type="image/png"
            href="/favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="Panozoom" />
        <link rel="manifest" href="/site.webmanifest" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Panozoom</title>
        <meta
            name="description"
            content="Upload an image and pan and zoom almost infinitely in your browser. Smooth and intuitive, with full keyboard support."
        />

        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Panozoom" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:title" content="Panozoom" />
        <meta
            property="og:description"
            content="Upload an image and pan and zoom almost infinitely in your browser. Smooth and intuitive, with full keyboard support."
        />
        <meta property="og:image" content="/panozoom-social-share.png" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta
            property="og:image:alt"
            content="Panozoom — pan and zoom images in the browser with keyboard shortcuts"
        />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Panozoom" />
        <meta
            name="twitter:description"
            content="Upload an image and pan and zoom almost infinitely in your browser. Smooth and intuitive, with full keyboard support."
        />
        <meta name="twitter:image" content="/panozoom-social-share.png" />
        <meta
            name="twitter:image:alt"
            content="Panozoom — pan and zoom images in the browser with keyboard shortcuts"
        />
    </head>
    <body>
        <panozoom-app>
            <label for="file-input" class="visually-hidden"
                >Open image file</label
            >
            <input
                type="file"
                id="file-input"
                accept="image/*"
                class="visually-hidden"
            />

            <!-- Toolbar -->
            <header class="toolbar">
                <p class="toolbar__title" id="file-label">Panozoom</p>

                <button class="btn btn--primary" id="btn-open" type="button">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    Open image
                </button>

                <div class="separator" role="separator"></div>

                <button class="btn" id="btn-fit" type="button">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <polyline points="15 3 21 3 21 9" />
                        <polyline points="9 21 3 21 3 15" />
                        <line x1="21" y1="3" x2="14" y2="10" />
                        <line x1="3" y1="21" x2="10" y2="14" />
                    </svg>
                    Fit <span class="visually-hidden">to screen (F)</span>
                </button>

                <button
                    class="btn"
                    id="btn-1x"
                    type="button"
                    title="Actual size (1)"
                >
                    1:1 <span class="visually-hidden">Actual size (1)</span>
                </button>

                <div class="separator" role="separator"></div>

                <button class="btn" id="btn-zoom-out" type="button">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                    <span class="visually-hidden">Zoom out</span>
                </button>

                <span
                    class="toolbar__zoom"
                    id="zoom-label"
                    aria-live="polite"
                    aria-atomic="true"
                    >—</span
                >

                <button class="btn" id="btn-zoom-in" type="button">
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="11" y1="8" x2="11" y2="14" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                    <span class="visually-hidden">Zoom in</span>
                </button>
            </header>

            <!-- Main canvas -->
            <main
                class="canvas"
                id="canvas"
                data-state="default"
                tabindex="0"
                role="application"
            >
                <h1 class="visually-hidden">
                    Image canvas. Use scroll wheel to zoom, drag to pan.
                </h1>

                <div class="stage" id="stage">
                    <!-- img injected here -->
                </div>

                <!-- Empty state -->
                <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
                    <div class="drop-overlay__ring">
                        <svg
                            width="40"
                            height="40"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <rect
                                x="3"
                                y="3"
                                width="18"
                                height="18"
                                rx="2"
                                ry="2"
                            />
                            <circle cx="8.5" cy="8.5" r="1.5" />
                            <polyline points="21 15 16 10 5 21" />
                        </svg>
                    </div>
                    <p class="drop-overlay__label">
                        <strong>Drop an image here</strong>
                        or click <kbd>Open image</kbd> in the toolbar
                    </p>
                </div>
            </main>

            <!-- Shortcuts cheat-sheet -->
            <aside class="shortcuts">
                <h2 class="visually-hidden">Keyboard shortcuts</h2>
                <div class="shortcuts__row">
                    <kbd>scroll</kbd>
                    <span class="shortcuts__label">zoom</span>
                </div>
                <div class="shortcuts__row">
                    <kbd>drag</kbd>
                    <span class="shortcuts__label">pan</span>
                </div>
                <div class="shortcuts__row">
                    <kbd>F</kbd>
                    <span class="shortcuts__label">fit</span>
                </div>
                <div class="shortcuts__row">
                    <kbd>1</kbd>
                    <span class="shortcuts__label">100%</span>
                </div>
                <div class="shortcuts__row">
                    <kbd>+</kbd> / <kbd>−</kbd>
                    <span class="shortcuts__label">zoom ±</span>
                </div>
            </aside>
        </panozoom-app>

        <script type="module" src="/src/panozoom.ts"></script>
    </body>
</html>
